version: 2

project_name: freecam

before:
  hooks:
    - go mod tidy

builds:
  - id: freecam
    main: ./cmd/freecam
    binary: freecam
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  name_template: "freecam {{.Tag}} — Camera Liberation"
  header: |
    ## freecam {{.Tag}}

    **Free your PTP camera from macOS.**

    macOS's `ptpcamera` daemon silently grabs exclusive USB access to any PTP camera
    (Canon, Nikon, Sony, Fujifilm, Olympus, and more), locking out Darktable, digiKam,
    Lightroom, and every other third-party tool. freecam watches for the daemon and
    kills it on sight — keeping your camera available to the software you actually want.

    ### Install via Homebrew
    ```sh
    brew install joennespreuwers/tap/freecam
    ```

    ### Or download below
    Pick the binary for your Mac:
    - `freecam_*_darwin_arm64.tar.gz` — Apple Silicon (M1/M2/M3/M4)
    - `freecam_*_darwin_amd64.tar.gz` — Intel Mac
  footer: |
    ---
    **Full Changelog**: https://github.com/joennespreuwers/freecam/commits/{{.Tag}}

brews:
  - name: freecam
    repository:
      owner: joennespreuwers
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/joennespreuwers/freecam"
    description: "Free your PTP camera (Canon, Nikon, Sony, Fujifilm, Olympus…) from macOS ptpcamera daemon"
    license: "MIT"
    install: |
      bin.install "freecam"
    test: |
      system "#{bin}/freecam --version"
